name: "Observatory: Quality & Security"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ] # This triggers the scan on every PR

jobs:
  analyze:
    name: "Static Analysis & Security"
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. CodeQL: Deep Security Scan
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript-typescript, python'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # 2. Super-Linter: Checks for logic bugs and formatting
      - name: Run Super-Linter
        uses: github/super-linter@v5
        env:
          VALIDATE_ALL_CODEBASE: false 
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_TYPESCRIPT_ES: true
          VALIDATE_TSX: true
          VALIDATE_PYTHON_FLAKE8: true
          VALIDATE_PYTHON_BLACK: true

      # 3. Build & Test: The Regression Gate
      - name: Build and Test
        run: |
          npm ci
          npm run build
          npm test